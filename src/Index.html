<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base target="_top" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800&display=swap"
      rel="stylesheet"
    />
    <link href="./output.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/Deknoinarak/pmsknschool@main/src/output.css"
      crossorigin="anonymous"
      async="true"
    />
  </head>
  <body
    class="font-sarabun bg-gray-100 w-screen h-screen flex flex-col items-center justify-center"
  >
    <div class="flex items-center mb-8 gap-2">
      <img
        src="https://i.ibb.co/fVQxC5Hk/Untitled-design.png"
        alt="โรงเรียนเตรียมอุดมศึกษาน้อมเกล้ากุนนที"
        class="h-20 mb-4"
      />
      <div>
        <div class="text-indigo-900 font-bold text-xl">
          โรงเรียนเตรียมอุดมศึกษาน้อมเกล้ากุนนที
        </div>
        <div class="text-indigo-900 text-md">
          TRIAMUDOMSUKSANOMKLAOKUNNATEE SCHOOL
        </div>
      </div>
    </div>
    <div class="bg-white min-w-md p-5 rounded-lg shadow-sm">
      <div class="flex flex-col gap-3 mb-6 mt-3">
        <h1 class="text-2xl text-center">ระบบประเมินผลผู้ปฏิบัติงาน</h1>
        <!-- <h1 class="text-2xl text-center">ประจำปีการศึกษา 2569</h1> -->
      </div>

      <div>
        <div class="mt-2">
          <input
            id="phone"
            type="text"
            name="phone"
            autocomplete="tel"
            placeholder="เบอร์โทรศัพท์ 10 หลัก"
            class="block text-center w-full rounded-md bg-white h-10 px-3 py-1.5 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-blue-600 focus:ring-2 focus:ring-blue-600/50 transition-all"
          />
          <button
            type="submit"
            class="rounded-md bg-blue-600 px-3 py-2 h-10 text-base font-semibold text-white shadow-xs hover:bg-blue-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-blue-600 transition-all cursor-pointer w-full mt-3"
          >
            เข้าสู่ระบบ
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
